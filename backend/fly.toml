# fly.toml app configuration file generated for viberoom-api on 2026-05-03T18:08:03+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'viberoom-api'
primary_region = 'iad'

[build]

[env]
  CHROMA_PERSIST_DIR = '/app/data/chroma_db'
  DATABASE_URL = 'sqlite:////app/data/viberoom.db'
  HF_HOME = '/app/data/.cache/huggingface'
  PORT = '8000'

[[mounts]]
  source = 'viberoom_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
