# Fly.io config for the VibeRoom backend.
# Run `fly launch --copy-config --no-deploy` from this directory once to claim a name + region;
# answer "no" to "would you like to tweak settings before proceeding".
# Then `fly deploy`.

app = "viberoom-api"           # change to a unique name if taken
primary_region = "iad"          # iad = Ashburn, VA. Use sjc, lax, fra, sin, etc.

[build]

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////app/data/viberoom.db"
  CHROMA_PERSIST_DIR = "/app/data/chroma_db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "viberoom_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
